limit_req_zone $binary_remote_addr zone=auth_zone:10m rate=10r/m;
limit_req_zone $binary_remote_addr zone=api_zone:10m rate=100r/m;
limit_req_zone $binary_remote_addr zone=internal_zone:10m rate=300r/m;

server {
  listen 80;
  server_name _;

  add_header X-Frame-Options "DENY" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;

  proxy_http_version 1.1;
  proxy_set_header Host $host;
  proxy_set_header X-Real-IP $remote_addr;
  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  proxy_set_header X-Forwarded-Proto $scheme;
  proxy_set_header X-Request-ID $request_id;
  proxy_connect_timeout 5s;
  proxy_read_timeout 60s;
  proxy_send_timeout 60s;

  location = /health {
    access_log off;
    default_type application/json;
    return 200 '{"status":"ok","service":"api-gateway"}';
  }

  location /api/v1/auth/ {
    set $auth_upstream http://auth-service:8001;
    limit_req zone=auth_zone burst=5 nodelay;
    proxy_pass $auth_upstream;
  }

  location /api/v1/products/ {
    set $product_upstream http://product-service:8002;
    limit_req zone=api_zone burst=30 nodelay;
    proxy_pass $product_upstream;
  }

  location /api/v1/orders/ {
    set $order_upstream http://order-service:8003;
    limit_req zone=api_zone burst=30 nodelay;
    proxy_pass $order_upstream;
  }

  location /api/v1/inventory/ {
    set $inventory_upstream http://inventory-service:8004;
    limit_req zone=api_zone burst=20 nodelay;
    proxy_pass $inventory_upstream;
  }

  location /api/v1/payments/ {
    set $payment_upstream http://payment-service:8005;
    limit_req zone=api_zone burst=20 nodelay;
    proxy_pass $payment_upstream;
  }

  location /api/v1/notifications/ {
    set $notification_upstream http://notification-service:8006;
    limit_req zone=internal_zone burst=30 nodelay;
    proxy_pass $notification_upstream;
  }
}
