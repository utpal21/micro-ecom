services:
  # ============================================
  # Auth Service - Laravel 13
  # ============================================
  auth-service:
    build:
      context: ./services/auth-service
      dockerfile: Dockerfile
      target: development
    container_name: emp-auth-service
    ports:
      - "${AUTH_SERVICE_PORT:-8001}:8001"
    environment:
      # Database Configuration
      - DB_CONNECTION=pgsql
      - DB_HOST=postgres-auth
      - DB_PORT=5432
      - DB_DATABASE=emp_auth
      - DB_USERNAME=${POSTGRES_USER:-emp}
      - DB_PASSWORD=${POSTGRES_PASSWORD:-emp}
      
      # Redis Configuration
      - REDIS_HOST=redis-master
      - REDIS_PORT=6379
      
      # Application Configuration
      - APP_NAME=${APP_NAME:-EMPAuthService}
      - APP_ENV=${APP_ENV:-local}
      - APP_DEBUG=${APP_DEBUG:-true}
      - APP_URL=${APP_URL:-http://localhost:8001}
      - LOG_LEVEL=${LOG_LEVEL:-debug}
      
      # JWT Configuration
      - JWT_ISSUER=${JWT_ISSUER:-http://localhost:8001}
      - JWT_PLATFORM_AUDIENCE=${JWT_PLATFORM_AUDIENCE:-emp-platform}
      - JWT_ACCESS_TOKEN_TTL_MINUTES=${JWT_ACCESS_TOKEN_TTL_MINUTES:-15}
      - JWT_REFRESH_TOKEN_TTL_DAYS=${JWT_REFRESH_TOKEN_TTL_DAYS:-7}
      - SERVICE_TOKEN_API_KEY=${SERVICE_TOKEN_API_KEY:-change-me-in-production}
      
      # Security
      - BCRYPT_ROUNDS=${BCRYPT_ROUNDS:-12}
      
    depends_on:
      postgres-auth:
        condition: service_healthy
      redis-master:
        condition: service_healthy
    volumes:
      # Mount application code for development
      - ./services/auth-service:/var/www/auth-service
      # Persist storage (sessions, cache, logs, keys)
      - auth-storage:/var/www/auth-service/storage
      - auth-cache:/var/www/auth-service/bootstrap/cache
    networks:
      - emp-backend
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8001/api/health/live"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s

  # ============================================
  # Order Service - NestJS 11
  # ============================================
  order-service:
    build:
      context: .
      dockerfile: ./services/order-service/Dockerfile
      target: production
    container_name: emp-order-service
    ports:
      - "${ORDER_SERVICE_PORT:-8003}:8003"
      - "9464:9464"
    environment:
      # Database Configuration
      - DATABASE_URL=postgres://emp:emp@postgres-order:5432/emp_order
      - DATABASE_HOST=postgres-order
      - DATABASE_PORT=5432
      - DATABASE_USERNAME=${POSTGRES_USER:-emp}
      - DATABASE_PASSWORD=${POSTGRES_PASSWORD:-emp}
      - DATABASE_NAME=emp_order
      - DATABASE_SSL=false
      - REDIS_URL=redis://redis-master:6379
      - REDIS_HOST=redis-master
      - REDIS_PORT=6379
      - REDIS_DB=0
      - RABBITMQ_URL=amqp://emp:emp@rabbitmq:5672
      - RABBITMQ_HOST=rabbitmq
      - RABBITMQ_PORT=5672
      - RABBITMQ_USERNAME=${RABBITMQ_USER:-emp}
      - RABBITMQ_PASSWORD=${RABBITMQ_PASSWORD:-emp}
      - RABBITMQ_ORDER_EXCHANGE=order.exchange
      - RABBITMQ_PAYMENT_EXCHANGE=payment.exchange
      - RABBITMQ_ORDER_QUEUE=order.events
      - RABBITMQ_PAYMENT_QUEUE=order.payment.queue
      - RABBITMQ_PAYMENT_DLQ=order.payment.queue.dlq
      - AUTH_SERVICE_URL=http://auth-service:8001
      
      # Application Configuration
      - NODE_ENV=${NODE_ENV:-production}
      - PORT=8003
      - SERVICE_NAME=order-service
      
      # JWT Configuration
      - JWT_ALGORITHM=RS256
      - JWT_ISSUER=${JWT_ISSUER:-http://localhost:8001}
      - JWT_AUDIENCE=${JWT_PLATFORM_AUDIENCE:-emp-platform}
      
      # OpenTelemetry Configuration
      - OTEL_SERVICE_NAME=order-service
      - OTEL_SERVICE_VERSION=1.0.0
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://jaeger:4317
      - METRICS_PORT=9464
      
      # Logging
      - LOG_LEVEL=${LOG_LEVEL:-info}
    depends_on:
      postgres-order:
        condition: service_healthy
      redis-master:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - emp-backend
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8003/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ============================================
  # Inventory Service - NestJS 11
  # ============================================
  inventory-service:
    build:
      context: ./services/inventory-service
      dockerfile: Dockerfile
      target: production
    container_name: emp-inventory-service
    ports:
      - "${INVENTORY_SERVICE_PORT:-8004}:8004"
      - "9465:9465"
    environment:
      # Database Configuration
      - DB_HOST=postgres-inventory
      - DB_PORT=5432
      - DB_NAME=emp_inventory
      - DB_USER=${POSTGRES_USER:-emp}
      - DB_PASSWORD=${POSTGRES_PASSWORD:-emp}
      - REDIS_HOST=redis-master
      - REDIS_PORT=6379
      - RABBITMQ_URI=amqp://emp:emp@rabbitmq:5672
      - RABBITMQ_HOST=rabbitmq
      - RABBITMQ_PORT=5672
      - RABBITMQ_USERNAME=${RABBITMQ_USER:-emp}
      - RABBITMQ_PASSWORD=${RABBITMQ_PASSWORD:-emp}
      - AUTH_SERVICE_URL=http://auth-service:8001
      
      # Application Configuration
      - NODE_ENV=${NODE_ENV:-production}
      - PORT=8004
      - SERVICE_NAME=inventory-service
      
      # JWT Configuration
      - JWT_ISSUER=http://localhost:8001
      - JWT_AUDIENCE=emp-platform
      - JWKS_URL=http://auth-service:8001/api/.well-known/jwks.json
      
      # OpenTelemetry Configuration
      - OTEL_SERVICE_NAME=inventory-service
      - OTEL_SERVICE_VERSION=1.0.0
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://jaeger:4317
      - METRICS_PORT=9465
      
      # CORS Configuration
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:3000}
      
      # Throttling Configuration
      - THROTTLE_TTL=60
      - THROTTLE_LIMIT=100
      
      # Logging
      - LOG_LEVEL=${LOG_LEVEL:-info}
    depends_on:
      postgres-inventory:
        condition: service_healthy
      redis-master:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - emp-backend
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8004/api/v1/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 256M

  # ============================================
  # Product Service - NestJS 11
  # ============================================
  product-service:
    build:
      context: ./services/product-service
      dockerfile: Dockerfile
      target: production
    container_name: emp-product-service
    ports:
      - "${PRODUCT_SERVICE_PORT:-8002}:8002"
    environment:
      # Database Configuration
      - MONGODB_URI=mongodb://mongodb:27017/emp_product?directConnection=true
      - MONGODB_DB_NAME=emp_product
      
      # Application Configuration
      - NODE_ENV=${NODE_ENV:-development}
      - PORT=8002
      - SERVICE_NAME=product-service
      
      # Redis Configuration (for future use)
      - REDIS_HOST=redis-master
      - REDIS_PORT=6379
      
      # RabbitMQ Configuration (for future use)
      - RABBITMQ_URI=amqp://emp:emp@rabbitmq:5672
      
      # JWT & Auth Configuration (for validation)
      - AUTH_SERVICE_URL=http://auth-service:8001
      - JWT_ISSUER=http://localhost:8001
      - JWT_AUDIENCE=${JWT_PLATFORM_AUDIENCE:-emp-platform}
      - JWKS_URL=http://auth-service:8001/api/.well-known/jwks.json
      
      # OpenTelemetry Configuration
      - OTEL_SERVICE_NAME=product-service
      - OTEL_SERVICE_VERSION=1.0.0
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://jaeger:4317
      - METRICS_PORT=9464
      
      # CORS Configuration
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:3000}
      
      # Throttling Configuration
      - THROTTLE_TTL=60
      - THROTTLE_LIMIT=100
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - emp-backend
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:8002/health/live', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)}"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s
 
  # ============================================
  # Payment Service - NestJS 11
  # ============================================
  payment-service:
    build:
      context: ./services/payment-service
      dockerfile: Dockerfile
      target: production
    container_name: emp-payment-service
    ports:
      - "${PAYMENT_SERVICE_PORT:-8005}:3000"
      - "9466:9466"
    environment:
      # Database Configuration
      - DATABASE_URL=postgres://emp:emp@postgres-payment:5432/emp_payment
      - DATABASE_HOST=postgres-payment
      - DATABASE_PORT=5432
      - DATABASE_USERNAME=${POSTGRES_USER:-emp}
      - DATABASE_PASSWORD=${POSTGRES_PASSWORD:-emp}
      - DATABASE_NAME=emp_payment
      - DATABASE_SSL=false
      - REDIS_URL=redis://redis-master:6379
      - REDIS_HOST=redis-master
      - REDIS_PORT=6379
      - REDIS_DB=0
      - RABBITMQ_URL=amqp://emp:emp@rabbitmq:5672
      - RABBITMQ_HOST=rabbitmq
      - RABBITMQ_PORT=5672
      - RABBITMQ_USERNAME=${RABBITMQ_USER:-emp}
      - RABBITMQ_PASSWORD=${RABBITMQ_PASSWORD:-emp}
      - AUTH_SERVICE_URL=http://auth-service:8001
      
      # Application Configuration
      - NODE_ENV=${NODE_ENV:-production}
      - PORT=3000
      - SERVICE_NAME=payment-service
      
      # JWT Configuration
      - JWT_ALGORITHM=RS256
      - JWT_ISSUER=${JWT_ISSUER:-http://localhost:8001}
      - JWT_AUDIENCE=${JWT_PLATFORM_AUDIENCE:-emp-platform}
      - JWT_PUBLIC_KEY_PATH=/app/config/jwt/public.pem
      - JWKS_URL=http://auth-service:8001/api/.well-known/jwks.json
      
      # SSLCommerz Configuration
      - SSLCOMMERZ_STORE_ID=${SSLCOMMERZ_STORE_ID:-test_id}
      - SSLCOMMERZ_STORE_PASSWORD=${SSLCOMMERZ_STORE_PASSWORD:-test_password}
      - SSLCOMMERZ_SANDBOX=${SSLCOMMERZ_SANDBOX:-true}
      - SSLCOMMERZ_IPN_URL=${SSLCOMMERZ_IPN_URL:-http://localhost:8005/webhooks/sslcommerz}
      
      # OpenTelemetry Configuration
      - OTEL_SERVICE_NAME=payment-service
      - OTEL_SERVICE_VERSION=1.0.0
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://jaeger:4317
      - METRICS_PORT=9466
      
      # Logging
      - LOG_LEVEL=${LOG_LEVEL:-info}
    depends_on:
      postgres-payment:
        condition: service_healthy
      redis-master:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - emp-backend
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/v1/health/liveness"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
 
  # ============================================
  # Notification Service - Node.js / TypeScript
  # ============================================
  notification-service:
    build:
      context: .
      dockerfile: ./services/notification-service/Dockerfile
      target: production
    container_name: emp-notification-service
    ports:
      - "${NOTIFICATION_SERVICE_PORT:-8006}:8006"
      - "9467:9467"
    environment:
      # Redis Configuration
      - REDIS_HOST=redis-master
      - REDIS_PORT=6379
      - REDIS_DB=0
      
      # RabbitMQ Configuration
      - RABBITMQ_HOST=rabbitmq
      - RABBITMQ_PORT=5672
      - RABBITMQ_USER=${RABBITMQ_USER:-emp}
      - RABBITMQ_PASSWORD=${RABBITMQ_PASSWORD:-emp}
      - RABBITMQ_VHOST=/
      
      # SMTP Configuration
      - SMTP_HOST=${SMTP_HOST:-smtp.mailtrap.io}
      - SMTP_PORT=${SMTP_PORT:-2525}
      - SMTP_SECURE=${SMTP_SECURE:-false}
      - SMTP_USER=${SMTP_USER:-your-smtp-user}
      - SMTP_PASSWORD=${SMTP_PASSWORD:-your-smtp-password}
      - EMAIL_FROM=${EMAIL_FROM:-noreply@emp.com}
      - EMAIL_FROM_NAME=${EMAIL_FROM_NAME:-Enterprise Marketplace}
      
      # Twilio Configuration
      - TWILIO_ACCOUNT_SID=${TWILIO_ACCOUNT_SID:-AC00000000000000000000000000000000}
      - TWILIO_AUTH_TOKEN=${TWILIO_AUTH_TOKEN:-your-twilio-token}
      - TWILIO_FROM_NUMBER=${TWILIO_FROM_NUMBER:+1234567890}
      
      # Application Configuration
      - NODE_ENV=${NODE_ENV:-production}
      - PORT=8006
      - SERVICE_NAME=notification-service
      
      # OpenTelemetry Configuration
      - OTEL_SERVICE_NAME=notification-service
      - OTEL_SERVICE_VERSION=1.0.0
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://jaeger:4317
      - METRICS_PORT=9467
      
      # Logging
      - LOG_LEVEL=${LOG_LEVEL:-info}
    depends_on:
      redis-master:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - emp-backend
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8006/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ============================================
  # Admin Service - NestJS 11
  # ============================================
  admin-service:
    build:
      context: ./services/admin-service
      dockerfile: Dockerfile
      target: production
    container_name: emp-admin-service
    ports:
      - "${ADMIN_SERVICE_PORT:-8007}:8007"
      - "9468:9468"
    environment:
      # Database Configuration
      - DATABASE_URL=postgres://emp:emp@postgres-admin:5432/emp_admin
      - DATABASE_HOST=postgres-admin
      - DATABASE_PORT=5432
      - DATABASE_USERNAME=${POSTGRES_USER:-emp}
      - DATABASE_PASSWORD=${POSTGRES_PASSWORD:-emp}
      - DATABASE_NAME=emp_admin
      - DATABASE_SSL=false
      
      # Redis Configuration
      - REDIS_URL=redis://redis-master:6379
      - REDIS_HOST=redis-master
      - REDIS_PORT=6379
      - REDIS_DB=0
      
      # RabbitMQ Configuration
      - RABBITMQ_URL=amqp://emp:emp@rabbitmq:5672
      - RABBITMQ_HOST=rabbitmq
      - RABBITMQ_PORT=5672
      - RABBITMQ_USERNAME=${RABBITMQ_USER:-emp}
      - RABBITMQ_PASSWORD=${RABBITMQ_PASSWORD:-emp}
      
      # Auth Configuration
      - AUTH_SERVICE_URL=http://auth-service:8001
      - JWT_ISSUER=${JWT_ISSUER:-http://localhost:8001}
      - JWT_AUDIENCE=${JWT_PLATFORM_AUDIENCE:-emp-platform}
      - JWKS_URL=http://auth-service:8001/api/.well-known/jwks.json
      
      # Application Configuration
      - NODE_ENV=${NODE_ENV:-production}
      - PORT=8007
      - SERVICE_NAME=admin-service
      
      # OpenTelemetry Configuration
      - OTEL_SERVICE_NAME=admin-service
      - OTEL_SERVICE_VERSION=1.0.0
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://jaeger:4317
      - METRICS_PORT=9468
      
      # Logging
      - LOG_LEVEL=${LOG_LEVEL:-info}
      
      # CORS Configuration
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:3000}
    depends_on:
      postgres-admin:
        condition: service_healthy
      redis-master:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - emp-backend
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8007/api/v1/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ============================================
  # RabbitMQ Message Broker
  # ============================================
  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: emp-rabbitmq
    hostname: rabbitmq
    ports:
      - "${RABBITMQ_PORT:-5672}:5672"
      - "${RABBITMQ_MANAGEMENT_PORT:-15672}:15672"
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-emp}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-emp}
      RABBITMQ_SERVER_ADDITIONAL_ERL_ARGS: -rabbit log_levels [{connection,error},{default,warning}]
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    networks:
      - emp-backend
    restart: unless-stopped

  # ============================================
  # PostgreSQL - Auth Service Database
  # ============================================
  postgres-auth:
    image: postgres:17-alpine
    container_name: emp-postgres-auth
    ports:
      - "${POSTGRES_AUTH_PORT:-5433}:5432"
    environment:
      POSTGRES_DB: emp_auth
      POSTGRES_USER: ${POSTGRES_USER:-emp}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-emp}
      PGDATA: /var/lib/postgresql/data/pgdata
    command: 
      - "postgres"
      - "-c"
      - "config_file=/etc/postgresql/postgresql.conf"
      - "-c"
      - "listen_addresses=*"
      - "-c"
      - "max_connections=200"
      - "-c"
      - "shared_buffers=256MB"
      - "-c"
      - "effective_cache_size=1GB"
      - "-c"
      - "maintenance_work_mem=64MB"
      - "-c"
      - "checkpoint_completion_target=0.9"
      - "-c"
      - "wal_buffers=16MB"
      - "-c"
      - "default_statistics_target=100"
      - "-c"
      - "random_page_cost=1.1"
      - "-c"
      - "effective_io_concurrency=200"
      - "-c"
      - "work_mem=16MB"
      - "-c"
      - "min_wal_size=1GB"
      - "-c"
      - "max_wal_size=4GB"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-emp} -d emp_auth"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    volumes:
      # Persist database data
      - postgres-auth-data:/var/lib/postgresql/data
      # Custom PostgreSQL configuration
      - ./infrastructure/docker/postgres/postgresql.conf:/etc/postgresql/postgresql.conf:ro
      # Initialization scripts
      - ./infrastructure/docker/postgres/init:/docker-entrypoint-initdb.d:ro
    networks:
      - emp-backend
    restart: unless-stopped

  # ============================================
  # PostgreSQL - Order Service Database
  # ============================================
  postgres-order:
    image: postgres:17-alpine
    container_name: emp-postgres-order
    ports:
      - "${POSTGRES_ORDER_PORT:-5434}:5432"
    environment:
      POSTGRES_DB: emp_order
      POSTGRES_USER: ${POSTGRES_USER:-emp}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-emp}
      PGDATA: /var/lib/postgresql/data/pgdata
    command: 
      - "postgres"
      - "-c"
      - "config_file=/etc/postgresql/postgresql.conf"
      - "-c"
      - "listen_addresses=*"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-emp} -d emp_order"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    volumes:
      - postgres-order-data:/var/lib/postgresql/data
      - ./infrastructure/docker/postgres/postgresql.conf:/etc/postgresql/postgresql.conf:ro
      - ./infrastructure/docker/postgres/init:/docker-entrypoint-initdb.d:ro
    networks:
      - emp-backend
    restart: unless-stopped

  # ============================================
  # PostgreSQL - Inventory Service Database
  # ============================================
  postgres-inventory:
    image: postgres:17-alpine
    container_name: emp-postgres-inventory
    ports:
      - "${POSTGRES_INVENTORY_PORT:-5435}:5432"
    environment:
      POSTGRES_DB: emp_inventory
      POSTGRES_USER: ${POSTGRES_USER:-emp}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-emp}
      PGDATA: /var/lib/postgresql/data/pgdata
    command: 
      - "postgres"
      - "-c"
      - "config_file=/etc/postgresql/postgresql.conf"
      - "-c"
      - "listen_addresses=*"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-emp} -d emp_inventory"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    volumes:
      - postgres-inventory-data:/var/lib/postgresql/data
      - ./infrastructure/docker/postgres/postgresql.conf:/etc/postgresql/postgresql.conf:ro
      - ./infrastructure/docker/postgres/init:/docker-entrypoint-initdb.d:ro
    networks:
      - emp-backend
    restart: unless-stopped

  # ============================================
  # PostgreSQL - Payment Service Database
  # ============================================
  postgres-payment:
    image: postgres:17-alpine
    container_name: emp-postgres-payment
    ports:
      - "${POSTGRES_PAYMENT_PORT:-5436}:5432"
    environment:
      POSTGRES_DB: emp_payment
      POSTGRES_USER: ${POSTGRES_USER:-emp}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-emp}
      PGDATA: /var/lib/postgresql/data/pgdata
    command: 
      - "postgres"
      - "-c"
      - "config_file=/etc/postgresql/postgresql.conf"
      - "-c"
      - "listen_addresses=*"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-emp} -d emp_payment"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    volumes:
      - postgres-payment-data:/var/lib/postgresql/data
      - ./infrastructure/docker/postgres/postgresql.conf:/etc/postgresql/postgresql.conf:ro
      - ./infrastructure/docker/postgres/init:/docker-entrypoint-initdb.d:ro
    networks:
      - emp-backend
    restart: unless-stopped

  # ============================================
  # PostgreSQL - Admin Service Database
  # ============================================
  postgres-admin:
    image: postgres:17-alpine
    container_name: emp-postgres-admin
    ports:
      - "${POSTGRES_ADMIN_PORT:-5437}:5432"
    environment:
      POSTGRES_DB: emp_admin
      POSTGRES_USER: ${POSTGRES_USER:-emp}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-emp}
      PGDATA: /var/lib/postgresql/data/pgdata
    command: 
      - "postgres"
      - "-c"
      - "config_file=/etc/postgresql/postgresql.conf"
      - "-c"
      - "listen_addresses=*"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-emp} -d emp_admin"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    volumes:
      - postgres-admin-data:/var/lib/postgresql/data
      - ./infrastructure/docker/postgres/postgresql.conf:/etc/postgresql/postgresql.conf:ro
      - ./infrastructure/docker/postgres/init:/docker-entrypoint-initdb.d:ro
    networks:
      - emp-backend
    restart: unless-stopped

  # ============================================
  # MongoDB - Product Service Database
  # ============================================
  mongodb:
    image: mongo:7.0
    container_name: emp-mongodb
    command: 
      - "mongod"
      - "--replSet"
      - "emp-rs0"
      - "--bind_ip_all"
      - "--wiredTigerCacheSizeGB"
      - "1"
    ports:
      - "${MONGODB_PORT:-27017}:27017"
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    volumes:
      - mongodb-data:/data/db
      - mongodb-config:/data/configdb
    networks:
      - emp-backend
    restart: unless-stopped

  # ============================================
  # MongoDB Replica Set Initialization
  # ============================================
  mongo-init-replica:
    image: mongo:7.0
    container_name: emp-mongo-init-replica
    depends_on:
      mongodb:
        condition: service_healthy
    entrypoint:
      - /bin/sh
      - -c
      - mongosh --host mongodb:27017 /scripts/init-replica.js
    restart: "no"
    volumes:
      - ./infrastructure/docker/mongodb/init-replica.js:/scripts/init-replica.js:ro
    networks:
      - emp-backend

  # ============================================
  # Redis Master
  # ============================================
  redis-master:
    image: redis:7.2-alpine
    container_name: emp-redis-master
    command: ["redis-server", "/usr/local/etc/redis/redis.conf"]
    ports:
      - "${REDIS_MASTER_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 20s
    volumes:
      - redis-master-data:/data
      - ./infrastructure/docker/redis/redis-master.conf:/usr/local/etc/redis/redis.conf:ro
    networks:
      - emp-backend
    restart: unless-stopped

  # ============================================
  # Redis Replica 1
  # ============================================
  redis-replica-1:
    image: redis:7.2-alpine
    container_name: emp-redis-replica-1
    depends_on:
      redis-master:
        condition: service_healthy
    command: ["redis-server", "/usr/local/etc/redis/redis.conf", "--replicaof", "redis-master", "6379"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 20s
    volumes:
      - redis-replica-1-data:/data
      - ./infrastructure/docker/redis/redis-replica.conf:/usr/local/etc/redis/redis.conf:ro
    networks:
      - emp-backend
    restart: unless-stopped

  # ============================================
  # Redis Replica 2
  # ============================================
  redis-replica-2:
    image: redis:7.2-alpine
    container_name: emp-redis-replica-2
    depends_on:
      redis-master:
        condition: service_healthy
    command: ["redis-server", "/usr/local/etc/redis/redis.conf", "--replicaof", "redis-master", "6379"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 20s
    volumes:
      - redis-replica-2-data:/data
      - ./infrastructure/docker/redis/redis-replica.conf:/usr/local/etc/redis/redis.conf:ro
    networks:
      - emp-backend
    restart: unless-stopped

  # ============================================
  # Redis Sentinel 1
  # ============================================
  redis-sentinel-1:
    image: redis:7.2-alpine
    container_name: emp-redis-sentinel-1
    depends_on:
      redis-master:
        condition: service_healthy
    command:
      [
        "sh",
        "-c",
        "cp /etc/redis-source/sentinel.conf /tmp/sentinel.conf && redis-sentinel /tmp/sentinel.conf"
      ]
    ports:
      - "${REDIS_SENTINEL_1_PORT:-26379}:26379"
    healthcheck:
      test: ["CMD", "redis-cli", "-p", "26379", "ping"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 20s
    volumes:
      - ./infrastructure/docker/redis/sentinel.conf:/etc/redis-source/sentinel.conf:ro
    networks:
      - emp-backend
    restart: unless-stopped

  # ============================================
  # Redis Sentinel 2
  # ============================================
  redis-sentinel-2:
    image: redis:7.2-alpine
    container_name: emp-redis-sentinel-2
    depends_on:
      redis-master:
        condition: service_healthy
    command:
      [
        "sh",
        "-c",
        "cp /etc/redis-source/sentinel.conf /tmp/sentinel.conf && redis-sentinel /tmp/sentinel.conf"
      ]
    ports:
      - "${REDIS_SENTINEL_2_PORT:-26380}:26379"
    healthcheck:
      test: ["CMD", "redis-cli", "-p", "26379", "ping"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 20s
    volumes:
      - ./infrastructure/docker/redis/sentinel.conf:/etc/redis-source/sentinel.conf:ro
    networks:
      - emp-backend
    restart: unless-stopped

  # ============================================
  # Redis Sentinel 3
  # ============================================
  redis-sentinel-3:
    image: redis:7.2-alpine
    container_name: emp-redis-sentinel-3
    depends_on:
      redis-master:
        condition: service_healthy
    command:
      [
        "sh",
        "-c",
        "cp /etc/redis-source/sentinel.conf /tmp/sentinel.conf && redis-sentinel /tmp/sentinel.conf"
      ]
    ports:
      - "${REDIS_SENTINEL_3_PORT:-26381}:26379"
    healthcheck:
      test: ["CMD", "redis-cli", "-p", "26379", "ping"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 20s
    volumes:
      - ./infrastructure/docker/redis/sentinel.conf:/etc/redis-source/sentinel.conf:ro
    networks:
      - emp-backend
    restart: unless-stopped

# ============================================
# Networks
# ============================================
networks:
  emp-backend:
    driver: bridge
    name: emp-backend
    ipam:
      config:
        - subnet: 172.20.0.0/16

# ============================================
# Volumes - Data Persistence
# ============================================
volumes:
  # Auth Service Volumes
  auth-storage:
    driver: local
    name: emp-auth-storage
  auth-cache:
    driver: local
    name: emp-auth-cache
  
  # Message Broker
  rabbitmq-data:
    driver: local
    name: emp-rabbitmq-data
  
  # PostgreSQL Volumes
  postgres-auth-data:
    driver: local
    name: emp-postgres-auth-data
  postgres-order-data:
    driver: local
    name: emp-postgres-order-data
  postgres-inventory-data:
    driver: local
    name: emp-postgres-inventory-data
  postgres-payment-data:
    driver: local
    name: emp-postgres-payment-data
  postgres-admin-data:
    driver: local
    name: emp-postgres-admin-data
  
  # MongoDB Volumes
  mongodb-data:
    driver: local
    name: emp-mongodb-data
  mongodb-config:
    driver: local
    name: emp-mongodb-config
  
  # Redis Volumes
  redis-master-data:
    driver: local
    name: emp-redis-master-data
  redis-replica-1-data:
    driver: local
    name: emp-redis-replica-1-data
  redis-replica-2-data:
    driver: local
    name: emp-redis-replica-2-data
